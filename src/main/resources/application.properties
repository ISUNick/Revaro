# ================================================
# Revaro – Application Properties (Local Dev)
# ================================================

spring.application.name=revaro

# --- Database ---
spring.datasource.url=jdbc:postgresql://localhost:5432/revaro
spring.datasource.username=revaro_user
spring.datasource.password=revaro_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# --- Thymeleaf ---
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML

# --- File Upload ---
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB

# --- App Config ---
app.upload.dir=uploads/
app.base-url=http://localhost:8080

# --- Server ---
server.port=8080
server.error.whitelabel.enabled=false
