<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Notifications – Revaro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/revaro.css}"/>
</head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<section class="page-hero">
    <div class="container-xl">
        <h1>Notifications</h1>
    </div>
</section>

<div class="container-xl mt-4 mb-5" style="max-width:640px;">

    <div th:if="${notifications.empty}"
         class="revaro-card p-5 text-center"
         style="color:var(--color-text-muted);">
        <i class="bi bi-bell" style="font-size:2rem;opacity:0.3;display:block;margin-bottom:0.75rem;"></i>
        No notifications yet.
    </div>

    <div class="d-flex flex-column gap-2">
        <a th:each="notif : ${notifications}"
           th:href="${notif.link}"
           style="text-decoration:none;"
           class="revaro-card p-3 d-flex align-items-start gap-3"
           th:style="${!notif.read} ? 'border-left:3px solid var(--color-primary-light);' : 'border-left:3px solid transparent;'">

            <!-- Icon -->
            <div style="width:36px;height:36px;border-radius:50%;flex-shrink:0;
                        background:var(--color-surface-raised);display:flex;align-items:center;justify-content:center;">
                <i class="bi"
                   th:classappend="${notif.type.name() == 'COMMENT_ON_EVENT'} ? 'bi-chat-fill' :
                                   (${notif.type.name() == 'RSVP_GOING'} ? 'bi-check-circle-fill' :
                                   (${notif.type.name() == 'RSVP_INTERESTED'} ? 'bi-star-fill' :
                                   (${notif.type.name() == 'COMMENT_LIKED'} ? 'bi-heart-fill' : 'bi-bell-fill')))"
                   style="font-size:0.875rem;color:var(--color-primary-light);"></i>
            </div>

            <!-- Content -->
            <div style="flex:1;min-width:0;">
                <div style="font-size:0.875rem;color:var(--color-text);"
                     th:text="${notif.message}">Message</div>
                <div style="font-size:0.75rem;color:var(--color-text-muted);margin-top:0.2rem;"
                     th:text="${#temporals.format(notif.createdAt, 'MMM d · h:mm a')}">Time</div>
            </div>

            <!-- Unread dot -->
            <div th:unless="${notif.read}"
                 style="width:8px;height:8px;border-radius:50%;background:var(--color-primary-light);flex-shrink:0;margin-top:0.3rem;"></div>
        </a>
    </div>

    <!-- Pagination -->
    <div th:if="${notifications.totalPages > 1}"
         style="padding-top:1.5rem;display:flex;align-items:center;justify-content:center;gap:0.75rem;">
        <a th:href="@{/notifications(page=${notifications.number - 1})}"
           th:style="${notifications.first} ? 'opacity:0.3;pointer-events:none;' : ''"
           style="color:var(--color-text-muted);text-decoration:none;">
            <i class="bi bi-chevron-left"></i>
        </a>
        <span style="font-size:0.875rem;color:var(--color-text-muted);"
              th:text="'Page ' + ${notifications.number + 1} + ' of ' + ${notifications.totalPages}">Page 1</span>
        <a th:href="@{/notifications(page=${notifications.number + 1})}"
           th:style="${notifications.last} ? 'opacity:0.3;pointer-events:none;' : ''"
           style="color:var(--color-text-muted);text-decoration:none;">
            <i class="bi bi-chevron-right"></i>
        </a>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
