<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Contact – Revaro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/revaro.css}"/>
</head>
<body>
 
<nav th:replace="~{fragments/layout :: navbar}"></nav>
 
<section class="page-hero">
    <div class="container-xl">
        <h1>Get in Touch</h1>
        <p class="lead mb-0">Questions, feedback, or just want to say hey — drop us an email.</p>
    </div>
</section>
 
<div class="container-xl mt-5" style="max-width: 560px;">
 
    <div class="revaro-card p-5 mb-5 text-center">
        <div style="width: 56px; height: 56px; border-radius: var(--radius-md);
                    background: rgba(42,111,234,0.12); display: flex; align-items: center;
                    justify-content: center; margin: 0 auto 1.25rem;">
            <i class="bi bi-envelope-fill" style="color: var(--color-primary-light); font-size: 1.4rem;"></i>
        </div>
        <h2 style="font-size: 1.25rem; font-weight: 700; margin-bottom: 0.5rem;">Send us an email</h2>
        <p style="color: var(--color-text-muted); font-size: 0.9rem; line-height: 1.7; margin-bottom: 1.5rem;">
            Have a question, found a bug, or want to get involved?
            We read every message and try to respond within 24–48 hours.
        </p>
        <a href="mailto:nickbafia@gmail.com" class="btn btn-primary-revaro px-4 py-2" style="font-size: 1rem;">
            <i class="bi bi-envelope me-2"></i>nickbafia@gmail.com
        </a>
    </div>
 
</div>
 
<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
