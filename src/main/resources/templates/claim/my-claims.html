<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>My Claims – Revaro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/revaro.css}"/>
</head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<section class="page-hero">
    <div class="container-xl">
        <h1>My Claim Requests</h1>
        <p class="lead mb-0">Track the status of your event ownership claims.</p>
    </div>
</section>

<div class="container-xl mt-4" style="max-width: 760px;">

    <div th:replace="~{fragments/layout :: flash}"></div>

    <div th:if="${claims != null and !claims.empty}">
        <div th:each="claim : ${claims}" class="revaro-card p-4 mb-3">
            <div class="d-flex align-items-start justify-content-between gap-3 flex-wrap">

                <!-- Left: event info -->
                <div>
                    <a th:href="@{/events/{id}(id=${claim.event.id})}"
                       style="color: var(--color-text); text-decoration: none; font-weight: 600; font-size: 1rem;"
                       th:text="${claim.event.title}">Event Title</a>
                    <div style="color: var(--color-text-muted); font-size: 0.8rem; margin-top: 0.2rem;"
                         th:if="${claim.createdAt != null}"
                         th:text="'Submitted ' + ${#temporals.format(claim.createdAt, 'MMM d, yyyy')}">
                        Submitted Jan 1
                    </div>
                    <div th:if="${claim.message != null and !#strings.isEmpty(claim.message)}"
                         style="color: var(--color-text-muted); font-size: 0.85rem; margin-top: 0.5rem; font-style: italic;"
                         th:text="${#strings.abbreviate(claim.message, 120)}">
                        Message preview
                    </div>
                    <div th:if="${claim.adminNotes != null and !#strings.isEmpty(claim.adminNotes)}"
                         class="mt-2 p-2"
                         style="background: var(--color-raised); border-radius: var(--radius-sm); font-size: 0.8rem; color: var(--color-text-muted);">
                        <strong style="color: var(--color-text);">Admin note:</strong>
                        <span th:text="${claim.adminNotes}">Note</span>
                    </div>
                </div>

                <!-- Right: status badge -->
                <div th:switch="${claim.status.name()}">
                    <span th:case="'PENDING'"
                          style="background: rgba(243,156,18,0.15); color: var(--color-interested);
                                 padding: 0.3rem 0.75rem; border-radius: 20px; font-size: 0.75rem;
                                 font-weight: 600; white-space: nowrap;">
                        <i class="bi bi-hourglass-split me-1"></i>Pending Review
                    </span>
                    <span th:case="'APPROVED'"
                          style="background: rgba(46,204,113,0.15); color: var(--color-going);
                                 padding: 0.3rem 0.75rem; border-radius: 20px; font-size: 0.75rem;
                                 font-weight: 600; white-space: nowrap;">
                        <i class="bi bi-check-circle-fill me-1"></i>Approved
                    </span>
                    <span th:case="'REJECTED'"
                          style="background: rgba(232,64,64,0.15); color: var(--color-accent);
                                 padding: 0.3rem 0.75rem; border-radius: 20px; font-size: 0.75rem;
                                 font-weight: 600; white-space: nowrap;">
                        <i class="bi bi-x-circle-fill me-1"></i>Rejected
                    </span>
                </div>
            </div>
        </div>
    </div>

    <!-- Empty state -->
    <div th:if="${claims == null or claims.empty}"
         class="empty-state">
        <div class="empty-state-icon"><i class="bi bi-patch-question"></i></div>
        <div class="empty-state-title">No Claims Yet</div>
        <p class="mb-0">You haven't submitted any event ownership claims.</p>
    </div>

</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
