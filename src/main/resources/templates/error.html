<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Error – Revaro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <link rel="stylesheet" th:href="@{/css/revaro.css}"/>
</head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container-xl mt-5">
    <div class="empty-state">
        <div class="empty-state-icon">
            <i class="bi bi-exclamation-triangle" style="color: var(--color-accent);"></i>
        </div>
        <div class="empty-state-title">
            <span th:text="${status}">Error</span>
            – <span th:text="${error}">Something went wrong</span>
        </div>
        <p class="mb-4" style="color: var(--color-text-muted);"
           th:text="${message ?: 'An unexpected error occurred. Please try again.'}">
            An unexpected error occurred.
        </p>
        <a href="/" class="btn btn-primary-revaro">
            <i class="bi bi-arrow-left me-1"></i>Back to Home
        </a>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
