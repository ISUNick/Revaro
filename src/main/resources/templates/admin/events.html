<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Events – Admin – Revaro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/revaro.css}"/>
</head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<section class="page-hero">
    <div class="container-xl">
        <a th:href="@{/admin}" style="color: var(--color-text-muted); font-size: 0.875rem;">
            <i class="bi bi-arrow-left me-1"></i>Dashboard
        </a>
        <h1 class="mt-1">All Events</h1>
    </div>
</section>

<div class="container-xl mt-4 mb-5">
    <div th:replace="~{fragments/layout :: flash}"></div>

    <div th:if="${events != null and !events.empty}">
        <div th:each="event : ${events}" class="revaro-card p-3 mb-2">
            <div class="d-flex align-items-center justify-content-between gap-3 flex-wrap">
                <div>
                    <a th:href="@{/events/{id}(id=${event.id})}"
                       style="color: var(--color-text); font-weight: 600; text-decoration: none;"
                       th:text="${event.title}">Event Title</a>
                    <div style="font-size: 0.78rem; color: var(--color-text-muted); margin-top: 0.15rem;">
                        <span th:if="${event.eventType != null}"
                              th:text="${event.eventType.displayName}">Type</span>
                        <span th:if="${event.city != null}">
                            · <span th:text="${event.city}">City</span>
                            <span th:if="${event.state != null}">, <span th:text="${event.state}">ST</span></span>
                        </span>
                        · by
                        <span th:text="${event.creator != null ? event.creator.username : 'Unknown'}">user</span>
                        <span th:if="${event.createdAt != null}"
                              th:text="' · ' + ${#temporals.format(event.createdAt, 'MMM d, yyyy')}"></span>
                    </div>
                </div>
                <div class="d-flex align-items-center gap-2">
                    <span th:if="${event.status != null and event.status.name() != 'ACTIVE'}"
                          style="background: rgba(232,64,64,0.15); color: var(--color-accent);
                                 padding: 0.2rem 0.5rem; border-radius: 20px; font-size: 0.7rem; font-weight: 600;"
                          th:text="${event.status.displayName}">Status</span>
                    <a th:href="@{/events/{id}/edit(id=${event.id})}"
                       class="btn btn-sm btn-outline-revaro"
                       style="font-size: 0.75rem; padding: 0.2rem 0.6rem;">
                        Edit
                    </a>
                    <form th:action="@{/admin/events/{id}/delete(id=${event.id})}"
                          method="post" style="margin: 0;"
                          onsubmit="return confirm('Delete this event? This cannot be undone.')">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="btn btn-sm"
                                style="background: var(--color-accent); color: #fff; border: none;
                                       border-radius: var(--radius-sm); font-size: 0.75rem; padding: 0.2rem 0.6rem;">
                            Delete
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <!-- Pagination -->
        <nav th:if="${events.totalPages > 1}" class="mt-4">
            <ul class="pagination revaro-pagination justify-content-center">
                <li class="page-item" th:classappend="${events.first} ? 'disabled'">
                    <a class="page-link" th:href="@{/admin/events(page=${events.number - 1})}">
                        <i class="bi bi-chevron-left"></i>
                    </a>
                </li>
                <li th:each="i : ${#numbers.sequence(0, events.totalPages - 1)}"
                    class="page-item" th:classappend="${events.number == i} ? 'active'">
                    <a class="page-link" th:text="${i + 1}"
                       th:href="@{/admin/events(page=${i})}">1</a>
                </li>
                <li class="page-item" th:classappend="${events.last} ? 'disabled'">
                    <a class="page-link" th:href="@{/admin/events(page=${events.number + 1})}">
                        <i class="bi bi-chevron-right"></i>
                    </a>
                </li>
            </ul>
        </nav>
    </div>

    <div th:if="${events == null or events.empty}"
         class="empty-state">
        <div class="empty-state-icon"><i class="bi bi-calendar-x"></i></div>
        <div class="empty-state-title">No Events</div>
        <p class="mb-0">No events have been posted yet.</p>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
