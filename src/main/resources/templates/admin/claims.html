<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Claim Requests – Admin – Revaro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/revaro.css}"/>
</head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<section class="page-hero">
    <div class="container-xl">
        <div class="d-flex align-items-center gap-3">
            <a th:href="@{/admin}" style="color: var(--color-text-muted); font-size: 0.875rem;">
                <i class="bi bi-arrow-left me-1"></i>Dashboard
            </a>
        </div>
        <h1 class="mt-1">Claim Requests</h1>
    </div>
</section>

<div class="container-xl mt-4">
    <div th:replace="~{fragments/layout :: flash}"></div>

    <!-- Pending -->
    <h2 class="section-label">Pending
        <span style="font-weight: 400; color: var(--color-text-muted);"
              th:text="'(' + ${pendingClaims.size()} + ')'"></span>
    </h2>

    <div th:if="${pendingClaims != null and !pendingClaims.empty}">
        <div th:each="claim : ${pendingClaims}" class="revaro-card p-4 mb-3">

            <!-- Header -->
            <div class="d-flex align-items-start justify-content-between gap-3 flex-wrap mb-3">
                <div>
                    <div style="font-weight: 700; font-size: 1rem; color: var(--color-text);">
                        <i class="bi bi-person-fill me-1" style="color: var(--color-primary-light);"></i>
                        <span th:text="${claim.requester.username}">user</span>
                    </div>
                    <div style="font-size: 0.8rem; color: var(--color-text-muted);"
                         th:if="${claim.createdAt != null}"
                         th:text="'Submitted ' + ${#temporals.format(claim.createdAt, 'MMM d, yyyy h:mm a')}">
                        Submitted
                    </div>
                </div>
                <span style="background: rgba(243,156,18,0.15); color: var(--color-interested);
                             padding: 0.3rem 0.75rem; border-radius: 20px; font-size: 0.75rem; font-weight: 600;">
                    <i class="bi bi-hourglass-split me-1"></i>Pending
                </span>
            </div>

            <!-- Event -->
            <div class="mb-3 p-3"
                 style="background: var(--color-raised); border-radius: var(--radius-sm);">
                <div style="font-size: 0.75rem; color: var(--color-text-muted); margin-bottom: 0.2rem;">
                    Claiming event:
                </div>
                <a th:href="@{/events/{id}(id=${claim.event.id})}"
                   style="color: var(--color-primary-light); font-weight: 600;"
                   th:text="${claim.event.title}" target="_blank">Event Title</a>
                <div style="font-size: 0.8rem; color: var(--color-text-muted);"
                     th:if="${claim.event.eventDateTime != null}"
                     th:text="${#temporals.format(claim.event.eventDateTime, 'MMM d, yyyy')}">Date</div>
            </div>

            <!-- Message -->
            <div th:if="${claim.message != null and !#strings.isEmpty(claim.message)}"
                 class="mb-3">
                <div style="font-size: 0.75rem; color: var(--color-text-muted); margin-bottom: 0.3rem;">
                    Their message:
                </div>
                <div style="color: var(--color-text); font-size: 0.875rem; line-height: 1.6;
                            background: var(--color-raised); padding: 0.75rem; border-radius: var(--radius-sm);
                            border-left: 3px solid var(--color-primary);"
                     th:text="${claim.message}">Message</div>
            </div>

            <!-- Approve / Reject forms side by side -->
            <div class="row g-3">
                <div class="col-12 col-md-6">
                    <form th:action="@{/admin/claims/{id}/approve(id=${claim.id})}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <textarea name="adminNotes" class="form-control mb-2" rows="2"
                                  placeholder="Optional note to the requester..."></textarea>
                        <button type="submit" class="btn w-100"
                                style="background: var(--color-going); color: #fff; border: none;
                                       border-radius: var(--radius-sm); font-weight: 600;">
                            <i class="bi bi-check-circle me-1"></i>Approve
                        </button>
                    </form>
                </div>
                <div class="col-12 col-md-6">
                    <form th:action="@{/admin/claims/{id}/reject(id=${claim.id})}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <textarea name="adminNotes" class="form-control mb-2" rows="2"
                                  placeholder="Optional reason for rejection..."></textarea>
                        <button type="submit" class="btn w-100"
                                style="background: var(--color-accent); color: #fff; border: none;
                                       border-radius: var(--radius-sm); font-weight: 600;">
                            <i class="bi bi-x-circle me-1"></i>Reject
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div th:if="${pendingClaims == null or pendingClaims.empty}"
         class="revaro-card p-4 text-center mb-4"
         style="color: var(--color-text-muted);">
        <i class="bi bi-check-circle"
           style="font-size: 1.5rem; opacity:0.4; display:block; margin-bottom: 0.5rem;"></i>
        No pending claims!
    </div>

    <!-- History -->
    <h2 class="section-label mt-4">All Claims
        <span style="font-weight: 400; color: var(--color-text-muted);"
              th:text="'(' + ${allClaims.size()} + ')'"></span>
    </h2>

    <div th:if="${allClaims != null and !allClaims.empty}" class="mb-5">
        <div th:each="claim : ${allClaims}"
             th:if="${claim.status.name() != 'PENDING'}"
             class="revaro-card p-3 mb-2">
            <div class="d-flex align-items-center justify-content-between gap-3 flex-wrap">
                <div>
                    <strong th:text="${claim.requester.username}">user</strong>
                    <span style="color: var(--color-text-muted);"> → </span>
                    <a th:href="@{/events/{id}(id=${claim.event.id})}"
                       style="color: var(--color-primary-light);"
                       th:text="${claim.event.title}">Event</a>
                    <div style="font-size: 0.75rem; color: var(--color-text-muted);"
                         th:if="${claim.createdAt != null}"
                         th:text="${#temporals.format(claim.createdAt, 'MMM d, yyyy')}">Date</div>
                </div>
                <div th:switch="${claim.status.name()}">
                    <span th:case="'APPROVED'"
                          style="background: rgba(46,204,113,0.15); color: var(--color-going);
                                 padding: 0.25rem 0.6rem; border-radius: 20px; font-size: 0.75rem; font-weight: 600;">
                        <i class="bi bi-check-circle-fill me-1"></i>Approved
                    </span>
                    <span th:case="'REJECTED'"
                          style="background: rgba(232,64,64,0.15); color: var(--color-accent);
                                 padding: 0.25rem 0.6rem; border-radius: 20px; font-size: 0.75rem; font-weight: 600;">
                        <i class="bi bi-x-circle-fill me-1"></i>Rejected
                    </span>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
