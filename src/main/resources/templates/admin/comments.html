<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Comments – Admin – Revaro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/revaro.css}"/>
</head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<section class="page-hero">
    <div class="container-xl">
        <a th:href="@{/admin}" style="color:var(--color-text-muted);font-size:0.875rem;">
            <i class="bi bi-arrow-left me-1"></i>Dashboard
        </a>
        <h1 class="mt-1">Comments
            <span style="font-weight:400;font-size:1.1rem;color:var(--color-text-muted);"
                  th:text="'(' + ${comments.totalElements} + ')'"></span>
        </h1>
    </div>
</section>

<div class="container-xl mt-4 mb-5">
    <div th:replace="~{fragments/layout :: flash}"></div>

    <div class="d-flex flex-column gap-3">
        <div th:each="comment : ${comments}" class="revaro-card p-3">
            <div class="d-flex align-items-start justify-content-between gap-3">
                <!-- Comment info -->
                <div style="min-width:0;">
                    <!-- Author + event -->
                    <div class="d-flex align-items-center gap-2 flex-wrap mb-1">
                        <a th:if="${comment.user != null}"
                           th:href="@{/profile/{u}(u=${comment.user.username})}"
                           style="font-weight:700;color:var(--color-text);font-size:0.875rem;"
                           th:text="${comment.user.username}">User</a>
                        <span style="color:var(--color-text-muted);font-size:0.75rem;">on</span>
                        <a th:if="${comment.event != null}"
                           th:href="@{/events/{id}(id=${comment.event.id})}"
                           style="font-size:0.75rem;color:var(--color-primary-light);"
                           th:text="${#strings.abbreviate(comment.event.title, 35)}">Event</a>
                    </div>
                    <!-- Comment text -->
                    <div style="font-size:0.875rem;color:var(--color-text);line-height:1.5;margin-bottom:0.3rem;"
                         th:text="${#strings.abbreviate(comment.content, 150)}">Comment</div>
                    <!-- Date -->
                    <div style="font-size:0.72rem;color:var(--color-text-muted);"
                         th:text="${comment.createdAt != null ? #temporals.format(comment.createdAt, 'MMM d, yyyy · h:mm a') : ''}">Date</div>
                </div>

                <!-- Delete button -->
                <form th:action="@{/admin/comments/{id}/delete(id=${comment.id})}"
                      method="post" style="margin:0;flex-shrink:0;"
                      onsubmit="return confirm('Delete this comment?')">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <input type="hidden" name="returnUrl" value="/admin/comments"/>
                    <button type="submit" class="btn btn-sm"
                            style="padding:0.35rem 0.7rem;background:rgba(239,68,68,0.12);color:#f87171;
                                   border:1px solid rgba(239,68,68,0.3);border-radius:var(--radius-sm);">
                        <i class="bi bi-trash"></i>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- Pagination -->
    <nav th:if="${comments.totalPages > 1}" class="mt-4">
        <ul class="pagination revaro-pagination justify-content-center flex-wrap">
            <li class="page-item" th:classappend="${comments.first} ? 'disabled'">
                <a class="page-link" th:href="@{/admin/comments(page=${comments.number - 1})}">
                    <i class="bi bi-chevron-left"></i>
                </a>
            </li>
            <li th:each="i : ${#numbers.sequence(0, comments.totalPages - 1)}"
                class="page-item" th:classappend="${comments.number == i} ? 'active'">
                <a class="page-link" th:text="${i + 1}"
                   th:href="@{/admin/comments(page=${i})}">1</a>
            </li>
            <li class="page-item" th:classappend="${comments.last} ? 'disabled'">
                <a class="page-link" th:href="@{/admin/comments(page=${comments.number + 1})}">
                    <i class="bi bi-chevron-right"></i>
                </a>
            </li>
        </ul>
    </nav>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
