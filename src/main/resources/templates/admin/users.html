<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Users – Admin – Revaro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/revaro.css}"/>
</head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<section class="page-hero">
    <div class="container-xl">
        <a th:href="@{/admin}" style="color:var(--color-text-muted);font-size:0.875rem;">
            <i class="bi bi-arrow-left me-1"></i>Dashboard
        </a>
        <h1 class="mt-1">Users
            <span style="font-weight:400;font-size:1.1rem;color:var(--color-text-muted);"
                  th:text="'(' + ${users.size()} + ')'"></span>
        </h1>
    </div>
</section>

<div class="container-xl mt-4 mb-5">
    <div th:replace="~{fragments/layout :: flash}"></div>

    <!-- Mobile card list -->
    <div class="d-flex flex-column gap-3">
        <div th:each="user : ${users}" class="revaro-card p-3">
            <div class="d-flex align-items-start justify-content-between gap-2">
                <!-- User info -->
                <div>
                    <div class="d-flex align-items-center gap-2 flex-wrap mb-1">
                        <span style="font-weight:700;color:var(--color-text);" th:text="${user.username}">username</span>
                        <span th:if="${user.admin}"
                              style="background:rgba(42,111,234,0.2);color:var(--color-primary-light);
                                     padding:0.15rem 0.5rem;border-radius:20px;font-size:0.65rem;font-weight:700;">
                            ADMIN
                        </span>
                    </div>
                    <div style="font-size:0.8rem;color:var(--color-text-muted);" th:text="${user.email}">email</div>
                    <div style="font-size:0.75rem;color:var(--color-text-muted);margin-top:0.2rem;"
                         th:if="${user.createdAt != null}"
                         th:text="'Joined ' + ${#temporals.format(user.createdAt, 'MMM d, yyyy')}">Joined</div>
                </div>

                <!-- Actions -->
                <div class="d-flex flex-column gap-2 flex-shrink-0">
                    <form th:action="@{/admin/users/{id}/toggle-admin(id=${user.id})}" method="post" style="margin:0;">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="btn btn-sm btn-outline-revaro w-100"
                                style="font-size:0.75rem;white-space:nowrap;"
                                th:text="${user.admin} ? 'Remove Admin' : 'Make Admin'">Toggle</button>
                    </form>
                    <form th:action="@{/admin/users/{id}/delete(id=${user.id})}"
                          method="post" style="margin:0;"
                          th:unless="${user.id == currentNavUser?.id}"
                          th:data-username="${user.username}"
                          onsubmit="return confirm('Delete ' + this.dataset.username + '? This removes all their data.')">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="btn btn-sm w-100"
                                style="font-size:0.75rem;background:rgba(239,68,68,0.12);color:#f87171;
                                       border:1px solid rgba(239,68,68,0.3);border-radius:var(--radius-sm);">
                            <i class="bi bi-trash me-1"></i>Delete
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
