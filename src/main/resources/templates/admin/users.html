<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Users – Admin – Revaro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/revaro.css}"/>
</head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<section class="page-hero">
    <div class="container-xl">
        <a th:href="@{/admin}" style="color: var(--color-text-muted); font-size: 0.875rem;">
            <i class="bi bi-arrow-left me-1"></i>Dashboard
        </a>
        <h1 class="mt-1">Users
            <span style="font-weight: 400; font-size: 1.1rem; color: var(--color-text-muted);"
                  th:text="'(' + ${users.size()} + ')'"></span>
        </h1>
    </div>
</section>

<div class="container-xl mt-4 mb-5">
    <div th:replace="~{fragments/layout :: flash}"></div>

    <div class="revaro-card" style="overflow: hidden;">
        <table style="width: 100%; border-collapse: collapse;">
            <thead>
                <tr style="border-bottom: 1px solid var(--color-border);">
                    <th style="padding: 0.75rem 1rem; text-align: left; font-size: 0.75rem;
                               color: var(--color-text-muted); font-weight: 600; text-transform: uppercase;">
                        User
                    </th>
                    <th style="padding: 0.75rem 1rem; text-align: left; font-size: 0.75rem;
                               color: var(--color-text-muted); font-weight: 600; text-transform: uppercase;">
                        Email
                    </th>
                    <th style="padding: 0.75rem 1rem; text-align: left; font-size: 0.75rem;
                               color: var(--color-text-muted); font-weight: 600; text-transform: uppercase;">
                        Role
                    </th>
                    <th style="padding: 0.75rem 1rem; text-align: left; font-size: 0.75rem;
                               color: var(--color-text-muted); font-weight: 600; text-transform: uppercase;">
                        Joined
                    </th>
                    <th style="padding: 0.75rem 1rem; text-align: right; font-size: 0.75rem;
                               color: var(--color-text-muted); font-weight: 600; text-transform: uppercase;">
                        Actions
                    </th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="user : ${users}"
                    style="border-bottom: 1px solid var(--color-border);">
                    <td style="padding: 0.75rem 1rem;">
                        <div style="font-weight: 600; color: var(--color-text);"
                             th:text="${user.username}">username</div>
                    </td>
                    <td style="padding: 0.75rem 1rem; color: var(--color-text-muted); font-size: 0.875rem;"
                        th:text="${user.email}">email</td>
                    <td style="padding: 0.75rem 1rem;">
                        <span th:if="${user.admin}"
                              style="background: rgba(26,95,212,0.2); color: var(--color-primary-light);
                                     padding: 0.2rem 0.6rem; border-radius: 20px; font-size: 0.7rem; font-weight: 700;">
                            ADMIN
                        </span>
                        <span th:unless="${user.admin}"
                              style="color: var(--color-text-muted); font-size: 0.8rem;">
                            User
                        </span>
                    </td>
                    <td style="padding: 0.75rem 1rem; color: var(--color-text-muted); font-size: 0.8rem;"
                        th:if="${user.createdAt != null}"
                        th:text="${#temporals.format(user.createdAt, 'MMM d, yyyy')}">Date</td>
                    <td style="padding: 0.75rem 1rem; color: var(--color-text-muted); font-size: 0.8rem;"
                        th:unless="${user.createdAt != null}">—</td>
                    <td style="padding: 0.75rem 1rem; text-align: right;">
                        <form th:action="@{/admin/users/{id}/toggle-admin(id=${user.id})}"
                              method="post" style="margin: 0; display: inline;">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button type="submit" class="btn btn-sm btn-outline-revaro"
                                    style="font-size: 0.75rem; padding: 0.2rem 0.6rem;"
                                    th:text="${user.admin} ? 'Remove Admin' : 'Make Admin'">
                                Toggle
                            </button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
