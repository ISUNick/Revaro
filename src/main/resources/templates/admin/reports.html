<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Reports – Admin – Revaro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/revaro.css}"/>
</head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<section class="page-hero">
    <div class="container-xl">
        <a th:href="@{/admin}" style="color:var(--color-text-muted);font-size:0.875rem;">
            <i class="bi bi-arrow-left me-1"></i>Dashboard
        </a>
        <h1 class="mt-1">Reports
            <span style="font-weight:400;font-size:1.1rem;color:var(--color-text-muted);"
                  th:text="'(' + ${reports.totalElements} + ')'"></span>
        </h1>
    </div>
</section>

<div class="container-xl mt-4 mb-5">
    <div th:replace="~{fragments/layout :: flash}"></div>

    <!-- Filter tabs -->
    <div class="d-flex gap-3 mb-4" style="border-bottom:1px solid var(--color-border-subtle);padding-bottom:0.75rem;">
        <a th:href="@{/admin/reports}" style="font-size:0.875rem;font-weight:600;"
           th:style="${status == null} ? 'color:var(--color-primary-light);' : 'color:var(--color-text-muted);'">All</a>
        <a th:href="@{/admin/reports(status='PENDING')}" style="font-size:0.875rem;font-weight:600;"
           th:style="${status == 'PENDING'} ? 'color:var(--color-interested);' : 'color:var(--color-text-muted);'">
            Pending <span th:if="${pendingCount > 0}"
                          style="background:rgba(245,158,11,0.2);color:#fcd34d;padding:0.1rem 0.4rem;border-radius:20px;font-size:0.7rem;"
                          th:text="${pendingCount}">0</span>
        </a>
        <a th:href="@{/admin/reports(status='REVIEWED')}" style="font-size:0.875rem;font-weight:600;"
           th:style="${status == 'REVIEWED'} ? 'color:var(--color-going);' : 'color:var(--color-text-muted);'">Reviewed</a>
        <a th:href="@{/admin/reports(status='DISMISSED')}" style="font-size:0.875rem;font-weight:600;"
           th:style="${status == 'DISMISSED'} ? 'color:var(--color-text-muted);' : 'color:var(--color-text-muted);'">Dismissed</a>
    </div>

    <div class="d-flex flex-column gap-3">
        <div th:each="report : ${reports}" class="revaro-card p-3">
            <div class="d-flex align-items-start justify-content-between gap-3">
                <div style="min-width:0;flex:1;">

                    <!-- Type badge + status -->
                    <div class="d-flex align-items-center gap-2 mb-2 flex-wrap">
                        <span style="font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;padding:0.2rem 0.6rem;border-radius:20px;"
                              th:style="${report.reportType.name() == 'EVENT'} ? 'background:rgba(42,111,234,0.15);color:var(--color-primary-light);' :
                                         (${report.reportType.name() == 'COMMENT'} ? 'background:rgba(168,85,247,0.15);color:#c084fc;' :
                                         'background:rgba(245,158,11,0.15);color:#fcd34d;')"
                              th:text="${report.reportType.displayName}">Type</span>
                        <span style="font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;padding:0.2rem 0.6rem;border-radius:20px;"
                              th:style="${report.status.name() == 'PENDING'} ? 'background:rgba(245,158,11,0.15);color:#fcd34d;' :
                                         (${report.status.name() == 'REVIEWED'} ? 'background:rgba(34,197,94,0.15);color:#4ade80;' :
                                         'background:rgba(107,114,128,0.15);color:#9ca3af;')"
                              th:text="${report.status.displayName}">Status</span>
                        <span style="font-size:0.75rem;color:var(--color-text-muted);"
                              th:text="'Reported by ' + ${report.reporter.username} + ' · ' + ${#temporals.format(report.createdAt, 'MMM d, yyyy')}">Meta</span>
                    </div>

                    <!-- What was reported -->
                    <div style="font-size:0.875rem;color:var(--color-text);margin-bottom:0.4rem;">
                        <span th:if="${report.reportedEvent != null}">
                            Event: <a th:href="@{/events/{id}(id=${report.reportedEvent.id})}"
                                      style="color:var(--color-primary-light);"
                                      th:text="${report.reportedEvent.title}">Event</a>
                        </span>
                        <span th:if="${report.reportedComment != null}">
                            Comment by <strong th:text="${report.reportedComment.user?.username}">user</strong>:
                            <span style="color:var(--color-text-muted);"
                                  th:text="${#strings.abbreviate(report.reportedComment.content, 100)}">text</span>
                        </span>
                        <span th:if="${report.reportedUser != null}">
                            User: <a th:href="@{/profile/{u}(u=${report.reportedUser.username})}"
                                     style="color:var(--color-primary-light);"
                                     th:text="${report.reportedUser.username}">user</a>
                        </span>
                    </div>

                    <!-- Reason -->
                    <div th:if="${report.reason != null and !#strings.isEmpty(report.reason)}"
                         style="font-size:0.8rem;color:var(--color-text-muted);font-style:italic;">
                        "<span th:text="${report.reason}">reason</span>"
                    </div>
                </div>

                <!-- Actions -->
                <div class="d-flex flex-column gap-2 flex-shrink-0" th:if="${report.status.name() == 'PENDING'}">
                    <form th:action="@{/admin/reports/{id}/review(id=${report.id})}" method="post" style="margin:0;">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <input type="hidden" name="newStatus" value="REVIEWED"/>
                        <button type="submit" class="btn btn-sm"
                                style="font-size:0.75rem;background:rgba(34,197,94,0.12);color:#4ade80;
                                       border:1px solid rgba(34,197,94,0.3);border-radius:var(--radius-sm);white-space:nowrap;">
                            <i class="bi bi-check2 me-1"></i>Reviewed
                        </button>
                    </form>
                    <form th:action="@{/admin/reports/{id}/review(id=${report.id})}" method="post" style="margin:0;">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <input type="hidden" name="newStatus" value="DISMISSED"/>
                        <button type="submit" class="btn btn-sm"
                                style="font-size:0.75rem;background:rgba(107,114,128,0.12);color:#9ca3af;
                                       border:1px solid rgba(107,114,128,0.3);border-radius:var(--radius-sm);white-space:nowrap;">
                            <i class="bi bi-x me-1"></i>Dismiss
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <div th:if="${reports.empty}" class="revaro-card p-5 text-center" style="color:var(--color-text-muted);">
            <i class="bi bi-shield-check" style="font-size:2rem;opacity:0.3;display:block;margin-bottom:0.75rem;"></i>
            No reports to show.
        </div>
    </div>

    <!-- Pagination -->
    <div th:if="${reports.totalPages > 1}"
         style="padding-top:1.5rem;padding-bottom:2rem;display:flex;align-items:center;justify-content:center;gap:0.75rem;">
        <a th:href="@{/admin/reports(status=${status},page=${reports.number - 1})}"
           th:style="${reports.first} ? 'opacity:0.3;pointer-events:none;' : ''"
           style="color:var(--color-text-muted);text-decoration:none;">
            <i class="bi bi-chevron-left"></i>
        </a>
        <a th:each="i : ${#numbers.sequence(0, reports.totalPages - 1)}"
           th:href="@{/admin/reports(status=${status},page=${i})}"
           th:text="${i + 1}"
           th:style="${reports.number == i} ? 'color:var(--color-primary-light);font-weight:700;' : 'color:var(--color-text-muted);'"
           style="text-decoration:none;font-size:0.95rem;padding:0 0.25rem;">1</a>
        <a th:href="@{/admin/reports(status=${status},page=${reports.number + 1})}"
           th:style="${reports.last} ? 'opacity:0.3;pointer-events:none;' : ''"
           style="color:var(--color-text-muted);text-decoration:none;">
            <i class="bi bi-chevron-right"></i>
        </a>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
