<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Edit Profile – Revaro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/revaro.css}"/>
    <!-- Cropper.js -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/cropperjs@1.6.1/dist/cropper.min.css"/>
</head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<section class="page-hero">
    <div class="container-xl">
        <h1>Edit Profile</h1>
        <p class="lead mb-0">Update your profile picture and show off your car.</p>
    </div>
</section>

<div class="container-xl mt-4" style="max-width: 720px;">
    <div th:replace="~{fragments/layout :: flash}"></div>

    <form th:action="@{/profile/edit}" method="post" enctype="multipart/form-data">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <!-- Profile picture -->
        <div class="revaro-card p-4 mb-4">
            <h2 class="section-label">Profile Picture</h2>
            <div class="d-flex align-items-center gap-4 mb-3">
                <div class="profile-avatar lg">
                    <img th:if="${user.profileImage != null and !#strings.isEmpty(user.profileImage)}"
                         th:src=${user.profileImage}
                         th:alt="${user.username}" id="currentAvatar"/>
                    <span th:unless="${user.profileImage != null and !#strings.isEmpty(user.profileImage)}"
                          th:text="${user.initials}" id="avatarInitials">U</span>
                </div>
                <div>
                    <label for="profileImageFile" class="form-label">Upload new photo</label>
                    <input type="file" id="profileImageFile" name="profileImageFile"
                           class="form-control" accept="image/jpeg,image/png,image/webp"/>
                    <div style="font-size: 0.75rem; color: var(--color-text-muted); margin-top: 0.25rem;">
                        JPG, PNG, or WebP. Max 10MB. Will be cropped to a square.
                    </div>
                </div>
            </div>

            <!-- Crop preview area (hidden until file selected) -->
            <div id="cropperArea" style="display: none;">
                <div style="max-width: 400px; margin: 0 auto;">
                    <img id="cropperImage" style="max-width: 100%;"/>
                </div>
                <div class="d-flex gap-2 mt-3 justify-content-center">
                    <button type="button" class="btn btn-primary-revaro btn-sm" id="cropBtn">
                        <i class="bi bi-crop me-1"></i>Apply Crop
                    </button>
                    <button type="button" class="btn btn-outline-revaro btn-sm" id="cancelCropBtn">
                        Cancel
                    </button>
                </div>
                <input type="hidden" name="profileImageCropped" id="profileImageCropped"/>
            </div>
        </div>

        <!-- Car showcase -->
        <div class="revaro-card p-4 mb-4">
            <h2 class="section-label">Your Car</h2>
            <p style="color: var(--color-text-muted); font-size: 0.875rem; margin-bottom: 1.25rem;">
                Show off your ride on your public profile.
            </p>

            <div class="row g-3">
                <div class="col-4">
                    <label for="carYear" class="form-label">Year</label>
                    <input type="text" id="carYear" name="carYear" class="form-control"
                           th:value="${user.carYear}" placeholder="2023" maxlength="10"/>
                </div>
                <div class="col-4">
                    <label for="carMake" class="form-label">Make</label>
                    <input type="text" id="carMake" name="carMake" class="form-control"
                           th:value="${user.carMake}" placeholder="Toyota" maxlength="60"/>
                </div>
                <div class="col-4">
                    <label for="carModel" class="form-label">Model</label>
                    <input type="text" id="carModel" name="carModel" class="form-control"
                           th:value="${user.carModel}" placeholder="Supra" maxlength="60"/>
                </div>
            </div>

            <!-- Car image -->
            <div class="mt-3">
                <div th:if="${user.carImage != null and !#strings.isEmpty(user.carImage)}" class="mb-3">
                    <p class="form-label">Current car photo</p>
                    <div class="car-image-box" style="max-width: 340px; border-radius: var(--radius-md); overflow: hidden;">
                        <img th:src=${user.carImage} alt="Your car"/>
                    </div>
                </div>

                <label for="carImageFile" class="form-label">
                    <span th:text="${user.carImage != null} ? 'Replace car photo' : 'Upload car photo'">Upload car photo</span>
                </label>
                <input type="file" id="carImageFile" name="carImageFile"
                       class="form-control" accept="image/jpeg,image/png,image/webp"/>
                <div style="font-size: 0.75rem; color: var(--color-text-muted); margin-top: 0.25rem;">
                    Best at 16:9 ratio. Max 10MB.
                </div>
            </div>
        </div>

        <!-- Save -->
        <div class="d-flex gap-3 mb-5">
            <button type="submit" class="btn btn-primary-revaro px-4">
                <i class="bi bi-check-lg me-1"></i>Save Changes
            </button>
            <a th:href="@{/profile}" class="btn btn-outline-revaro px-4">Cancel</a>
        </div>
    </form>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>
<script src="https://cdn.jsdelivr.net/npm/cropperjs@1.6.1/dist/cropper.min.js"></script>
<script>
let cropper = null;

document.getElementById('profileImageFile').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(evt) {
        const img = document.getElementById('cropperImage');
        img.src = evt.target.result;
        document.getElementById('cropperArea').style.display = 'block';

        if (cropper) cropper.destroy();
        cropper = new Cropper(img, {
            aspectRatio: 1,       // Square for profile pics
            viewMode: 1,
            autoCropArea: 0.85,
            movable: true,
            zoomable: true,
        });
    };
    reader.readAsDataURL(file);
});

document.getElementById('cropBtn').addEventListener('click', function() {
    if (!cropper) return;
    const canvas = cropper.getCroppedCanvas({ width: 400, height: 400 });
    canvas.toBlob(function(blob) {
        // Replace the file input with the cropped blob
        const dt = new DataTransfer();
        const file = new File([blob], 'profile.jpg', { type: 'image/jpeg' });
        dt.items.add(file);
        document.getElementById('profileImageFile').files = dt.files;
        document.getElementById('cropperArea').style.display = 'none';
        cropper.destroy();
        cropper = null;

        // Show preview
        const url = URL.createObjectURL(blob);
        const avatar = document.querySelector('.profile-avatar.lg');
        avatar.innerHTML = '<img src="' + url + '" style="width:100%;height:100%;object-fit:cover;" />';
    }, 'image/jpeg', 0.92);
});

document.getElementById('cancelCropBtn').addEventListener('click', function() {
    document.getElementById('cropperArea').style.display = 'none';
    document.getElementById('profileImageFile').value = '';
    if (cropper) { cropper.destroy(); cropper = null; }
});
</script>
</body>
</html>
