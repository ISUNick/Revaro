<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Forgot Password – Revaro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/revaro.css}"/>
</head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="auth-container">
    <div class="auth-card">
        <div class="auth-logo">REV<span style="color:var(--color-primary-light);">aro</span></div>
        <div class="auth-subtitle">Reset your password</div>

        <div th:if="${successMessage}"
             class="alert alert-revaro-success d-flex align-items-center gap-2 py-2 px-3 mb-3">
            <i class="bi bi-check-circle-fill"></i>
            <span th:text="${successMessage}"></span>
        </div>
        <div th:if="${errorMessage}"
             class="alert alert-revaro-error d-flex align-items-center gap-2 py-2 px-3 mb-3">
            <i class="bi bi-exclamation-circle-fill"></i>
            <span th:text="${errorMessage}"></span>
        </div>

        <p style="font-size:0.875rem;color:var(--color-text-muted);margin-bottom:1.25rem;">
            Enter the email address on your account and we'll send you a reset link.
        </p>

        <form th:action="@{/auth/forgot-password}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="mb-3">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" id="email" name="email" class="form-control"
                       placeholder="you@example.com" required autocomplete="email"/>
            </div>
            <button type="submit" class="btn btn-primary-revaro w-100 py-2">
                Send Reset Link
            </button>
        </form>

        <div class="text-center mt-3" style="font-size:0.875rem;color:var(--color-text-muted);">
            <a th:href="@{/login}" style="color:var(--color-primary-light);font-weight:600;">
                Back to login
            </a>
        </div>
    </div>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
