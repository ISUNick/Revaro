<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Sign In – Revaro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <link rel="stylesheet" th:href="@{/css/revaro.css}"/>
</head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="auth-container">
    <div class="auth-card">

        <!-- Logo -->
        <div class="auth-logo">
            REV<span style="color: var(--color-primary-light);">aro</span>
        </div>
        <p class="auth-subtitle">Sign in to your account</p>

        <!-- Flash messages -->
        <div th:if="${successMessage}"
             class="alert alert-revaro-success d-flex align-items-center gap-2 py-2 px-3 mb-3">
            <i class="bi bi-check-circle-fill"></i>
            <span th:text="${successMessage}"></span>
        </div>
        <div th:if="${errorMessage}"
             class="alert alert-revaro-error d-flex align-items-center gap-2 py-2 px-3 mb-3">
            <i class="bi bi-exclamation-circle-fill"></i>
            <span th:text="${errorMessage}"></span>
        </div>

        <!-- Login form -->
        <form th:action="@{/login}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input type="text"
                       id="username"
                       name="username"
                       class="form-control"
                       placeholder="your username"
                       autocomplete="username"
                       required/>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password"
                       id="password"
                       name="password"
                       class="form-control"
                       placeholder="••••••••"
                       autocomplete="current-password"
                       required/>
            </div>

            <div class="mb-4 d-flex align-items-center justify-content-between">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox"
                           name="remember-me" id="rememberMe"/>
                    <label class="form-check-label" for="rememberMe"
                           style="color: var(--color-text-muted); font-size: 0.875rem;">
                        Remember me
                    </label>
                </div>
            </div>

            <div class="d-flex justify-content-end mb-2">
                <a th:href="@{/auth/forgot-password}"
                   style="font-size:0.8rem;color:var(--color-primary-light);">Forgot password?</a>
            </div>
            <button type="submit" class="btn btn-primary-revaro w-100 py-2">
                Sign In
            </button>
        </form>

        <hr style="border-color: var(--color-border-subtle); margin: 1.5rem 0;"/>

        <p class="text-center mb-0" style="font-size: 0.875rem; color: var(--color-text-muted);">
            Don't have an account?
            <a th:href="@{/register}" style="color: var(--color-primary-light); font-weight: 600;">
                Join Revaro
            </a>
        </p>

    </div>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
