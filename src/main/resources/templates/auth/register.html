<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Join Revaro – Create Account</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <link rel="stylesheet" th:href="@{/css/revaro.css}"/>
</head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="auth-container">
    <div class="auth-card" style="max-width: 460px;">

        <!-- Logo -->
        <div class="auth-logo">
            REV<span style="color: var(--color-primary-light);">aro</span>
        </div>
        <p class="auth-subtitle">Create your free account</p>

        <!-- Error message -->
        <div th:if="${errorMessage}"
             class="alert alert-revaro-error d-flex align-items-center gap-2 py-2 px-3 mb-3">
            <i class="bi bi-exclamation-circle-fill"></i>
            <span th:text="${errorMessage}"></span>
        </div>

        <!-- Register form -->
        <form th:action="@{/register}" th:object="${registerDto}" method="post" novalidate>
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <!-- Username -->
            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input type="text"
                       id="username"
                       th:field="*{username}"
                       class="form-control"
                       th:classappend="${#fields.hasErrors('username')} ? 'is-invalid'"
                       placeholder="3–30 characters"
                       autocomplete="username"/>
                <div th:if="${#fields.hasErrors('username')}"
                     class="invalid-feedback" th:errors="*{username}"></div>
            </div>

            <!-- Email -->
            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email"
                       id="email"
                       th:field="*{email}"
                       class="form-control"
                       th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                       placeholder="you@example.com"
                       autocomplete="email"/>
                <div th:if="${#fields.hasErrors('email')}"
                     class="invalid-feedback" th:errors="*{email}"></div>
            </div>

            <!-- Password -->
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password"
                       id="password"
                       th:field="*{password}"
                       class="form-control"
                       th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"
                       placeholder="At least 8 characters"
                       autocomplete="new-password"/>
                <div th:if="${#fields.hasErrors('password')}"
                     class="invalid-feedback" th:errors="*{password}"></div>
            </div>

            <!-- Confirm password -->
            <div class="mb-4">
                <label for="confirmPassword" class="form-label">Confirm Password</label>
                <input type="password"
                       id="confirmPassword"
                       th:field="*{confirmPassword}"
                       class="form-control"
                       th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid'"
                       placeholder="Repeat your password"
                       autocomplete="new-password"/>
                <div th:if="${#fields.hasErrors('confirmPassword')}"
                     class="invalid-feedback" th:errors="*{confirmPassword}"></div>
            </div>

            <button type="submit" class="btn btn-primary-revaro w-100 py-2">
                Create Account
            </button>
        </form>

        <hr style="border-color: var(--color-border-subtle); margin: 1.5rem 0;"/>

        <p class="text-center mb-0" style="font-size: 0.875rem; color: var(--color-text-muted);">
            Already have an account?
            <a th:href="@{/login}" style="color: var(--color-primary-light); font-weight: 600;">
                Sign In
            </a>
        </p>

    </div>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
