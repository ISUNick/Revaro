# ================================================
# Revaro – Application Properties (Docker)
# ================================================

# --- Database (uses Docker Compose service name) ---
spring.datasource.url=jdbc:postgresql://db:5432/revaro
spring.datasource.username=${POSTGRES_USER:revaro_user}
spring.datasource.password=${POSTGRES_PASSWORD:revaro_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# --- Thymeleaf ---
spring.thymeleaf.cache=true
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML

# --- File Upload ---
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB

# --- App Config ---
app.upload.dir=/app/uploads/
app.base-url=${APP_BASE_URL:http://localhost:8080}

# --- Server ---
server.port=8080
server.error.whitelabel.enabled=false
